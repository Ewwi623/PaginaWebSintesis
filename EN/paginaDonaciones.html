<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations</title>
    <link rel="shortcut icon" href="../IMG/LOGO.png" />
    <link rel="stylesheet" href="../CSS/estiloPaginaDonaciones.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Habibi">
</head>
<body>
    <div class="header-container">
        <img class="logo" src="../IMG/LOGO.png">
        <div class="titulos">
            <h1>Vidas Con Futuro</h1>
            <h2>...Together we will make a better future</h2>
        </div>
        <div class="enlaces-centro">
            <a href="index.html">Home</a>
            <a href="paginaNosotros.html">About Us</a>
            <a href="paginaProyectos.html">Projects</a>
        </div>
        <div class="contacto">
            <a href="paginaDonaciones.html">Donations</a>
            <a href="paginaContactanos.html">Contact Us</a>
        </div>
    </div>
    <br>
    <div class="contenido">
        <h1>Thank you for supporting our cause</h1>
        <p>Your generosity makes it possible for us to continue helping those who need it most.</p>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nombre">Your Name:</label>
                <input type="text" id="nombre" name="nombre" placeholder="e.g. Pepito" required>
            </div>
            <div class="form-group">
                <label for="correo">Your Email Address:</label>
                <input type="email" id="correo" name="correo" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="telefono">Your Phone Number:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="e.g. +34 600 000 000" required>
            </div>
            <div class="form-group">
                <label for="campo-libre">Enter the amount:</label>
                <input type="number" id="cantidad" name="cantidad" placeholder="e.g. 10" required>
            </div>
            <button type="submit">Proceed to payment</button>
        </form>
    </div>
</body>
</html>

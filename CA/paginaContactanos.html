            <h1>Vidas Con Futuro</h1>
            <h2>...Junts farem un futur millor</h2>

    <br>
    <div class="contenido">
        <h1>Gràcies per prendre'v l'ofici de contactar-nos</h1>
        <p>Si us plau, omple aquest formulari i et respondrem el més aviat possible:</p>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nombre">El vostre nom:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ex. Pepe" required>
            </div>
            <div class="form-group">
                <label for="correo">El vostre correu electrònic:</label>
                <input type="email" id="correo" name="correo" placeholder="exemple@correu.com" required>
            </div>
            <div class="form-group">
                <label for="telefono">El vostre número de telèfon:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ex. +34 600 000 000" required>
            </div>
            <div class="form-group">
                <label for="campo-libre">El vostre missatge:</label>
                <textarea id="campo-libre" name="campo_libre" placeholder="Escriviu aquí els detalls..." required></textarea>
            </div>
            <button type="submit">Enviar formulari</button>
        </form>
    </div>
</body>
